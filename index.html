<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marst Chat</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e10;
    --bg2: #16161a;
    --bg3: #1e1e24;
    --bg4: #26262e;
    --border: #2e2e38;
    --accent: #7c6af7;
    --accent2: #9d8fff;
    --text: #e8e8f0;
    --text2: #9090a8;
    --text3: #5a5a72;
    --danger: #f76a6a;
    --success: #4fd18b;
    --dm: #f0a050;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

  /* ── SCREENS ── */
  .screen { display: none; width: 100%; height: 100vh; }
  .screen.active { display: flex; }

  /* ── AUTH ── */
  #auth-screen {
    align-items: center; justify-content: center;
    background: var(--bg);
    flex-direction: column;
    gap: 0;
  }
  .auth-wrap {
    width: 360px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 36px;
  }
  .auth-logo {
    font-size: 24px; font-weight: 600; letter-spacing: -0.5px;
    margin-bottom: 4px; color: var(--text);
  }
  .auth-logo span { color: var(--accent2); }
  .auth-tagline { font-size: 13px; color: var(--text3); margin-bottom: 32px; }
  .tab-row { display: flex; gap: 0; margin-bottom: 28px; background: var(--bg3); border-radius: var(--radius-sm); padding: 4px; }
  .tab-btn {
    flex: 1; padding: 8px; border: none; background: transparent;
    color: var(--text2); font-family: inherit; font-size: 13px; font-weight: 500;
    border-radius: 6px; cursor: pointer; transition: all .18s;
  }
  .tab-btn.active { background: var(--bg4); color: var(--text); }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--text3); margin-bottom: 6px; font-weight: 500; letter-spacing: .03em; text-transform: uppercase; }
  .field input {
    width: 100%; padding: 10px 14px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: inherit; font-size: 14px; outline: none;
    transition: border-color .15s;
  }
  .field input:focus { border-color: var(--accent); }
  .auth-btn {
    width: 100%; padding: 11px;
    background: var(--accent); border: none; border-radius: var(--radius-sm);
    color: #fff; font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; margin-top: 6px; transition: opacity .15s;
  }
  .auth-btn:hover { opacity: .85; }
  .auth-err { font-size: 12px; color: var(--danger); margin-top: 10px; text-align: center; min-height: 16px; }

  /* ── MAIN LAYOUT ── */
  #main-screen { flex-direction: row; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 260px; min-width: 260px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    height: 100vh;
  }
  .sidebar-header {
    padding: 18px 16px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-logo { font-size: 16px; font-weight: 600; color: var(--text); letter-spacing: -.3px; }
  .sidebar-logo span { color: var(--accent2); }
  .icon-btn {
    width: 30px; height: 30px; border-radius: 8px;
    background: transparent; border: 1px solid var(--border);
    color: var(--text2); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s; line-height: 1;
  }
  .icon-btn:hover { background: var(--bg3); color: var(--text); }

  .section-label {
    font-size: 10px; font-weight: 600; color: var(--text3);
    letter-spacing: .08em; text-transform: uppercase;
    padding: 14px 16px 6px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .section-label button {
    background: none; border: none; color: var(--accent2);
    font-size: 18px; cursor: pointer; line-height: 1; padding: 0;
  }

  .room-item, .dm-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 16px; cursor: pointer;
    border-radius: 0; transition: background .12s;
    position: relative;
  }
  .room-item:hover, .dm-item:hover { background: var(--bg3); }
  .room-item.active, .dm-item.active { background: var(--bg4); }
  .room-icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--bg4); display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0; color: var(--accent2); font-family: 'DM Mono', monospace;
  }
  .room-info { flex: 1; min-width: 0; }
  .room-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .room-last { font-size: 11px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
  .unread-badge {
    background: var(--accent); color: #fff;
    font-size: 10px; font-weight: 600;
    padding: 2px 6px; border-radius: 10px; min-width: 18px; text-align: center;
  }

  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; flex-shrink: 0;
    background: var(--bg4); color: var(--accent2);
  }
  .online-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--success); border: 2px solid var(--bg2);
    position: absolute; bottom: 10px; left: 40px;
  }

  .sidebar-footer {
    margin-top: auto; padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .my-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--accent); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; flex-shrink: 0;
  }
  .my-info { flex: 1; min-width: 0; }
  .my-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .my-status { font-size: 11px; color: var(--success); }
  .logout-btn {
    background: none; border: none; color: var(--text3);
    font-size: 18px; cursor: pointer; padding: 4px; transition: color .15s;
  }
  .logout-btn:hover { color: var(--danger); }

  .sidebar-scroll { flex: 1; overflow-y: auto; }
  .sidebar-scroll::-webkit-scrollbar { width: 4px; }
  .sidebar-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── CHAT AREA ── */
  .chat-area {
    flex: 1; display: flex; flex-direction: column;
    background: var(--bg); height: 100vh; min-width: 0;
  }
  .chat-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
    background: var(--bg2);
  }
  .chat-header-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--bg4); display: flex; align-items: center; justify-content: center;
    color: var(--accent2); font-family: 'DM Mono', monospace; font-size: 14px;
  }
  .chat-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .chat-subtitle { font-size: 12px; color: var(--text3); margin-top: 1px; }
  .header-actions { margin-left: auto; display: flex; gap: 8px; }

  .messages {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg-group { display: flex; flex-direction: column; margin-bottom: 12px; }
  .msg-row { display: flex; align-items: flex-end; gap: 8px; }
  .msg-row.mine { flex-direction: row-reverse; }
  .msg-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--bg4); color: var(--accent2);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; flex-shrink: 0; margin-bottom: 2px;
  }
  .msg-content { max-width: 60%; display: flex; flex-direction: column; gap: 2px; }
  .msg-row.mine .msg-content { align-items: flex-end; }
  .msg-name { font-size: 11px; color: var(--text3); margin-bottom: 3px; font-weight: 500; }
  .msg-bubble {
    padding: 9px 13px;
    border-radius: 16px 16px 16px 4px;
    background: var(--bg3); color: var(--text);
    font-size: 14px; line-height: 1.5;
    border: 1px solid var(--border);
    word-break: break-word;
  }
  .msg-row.mine .msg-bubble {
    background: var(--accent); color: #fff; border-color: var(--accent);
    border-radius: 16px 16px 4px 16px;
  }
  .msg-time { font-size: 10px; color: var(--text3); padding: 0 4px; }

  .chat-input-wrap {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg2);
    display: flex; align-items: flex-end; gap: 10px;
  }
  .chat-input-box { flex: 1; position: relative; }
  #msg-input {
    width: 100%; padding: 10px 14px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-family: inherit; font-size: 14px; outline: none;
    resize: none; line-height: 1.5; max-height: 120px;
    transition: border-color .15s;
  }
  #msg-input:focus { border-color: var(--accent); }
  .send-btn {
    width: 40px; height: 40px; border-radius: 10px;
    background: var(--accent); border: none; color: #fff;
    font-size: 18px; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: opacity .15s; flex-shrink: 0;
  }
  .send-btn:hover { opacity: .85; }

  /* ── EMPTY STATE ── */
  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px;
    color: var(--text3);
  }
  .empty-icon { font-size: 48px; margin-bottom: 8px; }
  .empty-title { font-size: 18px; font-weight: 500; color: var(--text2); }
  .empty-sub { font-size: 13px; }

  /* ── MODALS ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.6); z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px; width: 360px; max-width: 90vw;
  }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 20px; color: var(--text); }
  .modal-field { margin-bottom: 14px; }
  .modal-field label { display: block; font-size: 12px; color: var(--text3); margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: .03em; }
  .modal-field input {
    width: 100%; padding: 10px 14px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: inherit; font-size: 14px; outline: none;
    transition: border-color .15s;
  }
  .modal-field input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; margin-top: 6px; }
  .modal-btn {
    flex: 1; padding: 10px; border-radius: var(--radius-sm);
    font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity .15s;
  }
  .modal-btn.primary { background: var(--accent); border: none; color: #fff; }
  .modal-btn.secondary { background: transparent; border: 1px solid var(--border); color: var(--text2); }
  .modal-btn:hover { opacity: .8; }
  .modal-err { font-size: 12px; color: var(--danger); margin-top: 8px; min-height: 16px; }
  .invite-code-box {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px 14px;
    font-family: 'DM Mono', monospace; font-size: 18px;
    text-align: center; color: var(--accent2); letter-spacing: .1em;
    margin-bottom: 10px; cursor: pointer; transition: background .15s;
  }
  .invite-code-box:hover { background: var(--bg4); }
  .copy-hint { font-size: 11px; color: var(--text3); text-align: center; }

  /* profile modal */
  .profile-header { text-align: center; margin-bottom: 20px; }
  .profile-avatar-big {
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--accent); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 600; margin: 0 auto 10px;
  }
  .profile-uid { font-size: 12px; color: var(--text3); margin-top: 4px; font-family: 'DM Mono', monospace; }

  /* toast */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--bg4); border: 1px solid var(--border);
    color: var(--text); padding: 10px 20px; border-radius: 20px;
    font-size: 13px; opacity: 0; transition: all .25s; z-index: 200; white-space: nowrap;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .dm-avatar-wrap { position: relative; }
  .sep { height: 1px; background: var(--border); margin: 4px 16px; }
</style>
</head>
<body>

<!-- TOAST -->
<div id="toast"></div>

<!-- AUTH SCREEN -->
<div id="auth-screen" class="screen active">
  <div class="auth-wrap">
    <div class="auth-logo">Marst<span>Chat</span></div>
    <div class="auth-tagline">친구들과 실시간으로 대화하세요</div>
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('login')">로그인</button>
      <button class="tab-btn" onclick="switchTab('signup')">회원가입</button>
    </div>
    <div id="login-form">
      <div class="field"><label>아이디 (이메일)</label><input type="email" id="login-email" placeholder="you@example.com"></div>
      <div class="field"><label>비밀번호</label><input type="password" id="login-pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="auth-btn" onclick="doLogin()">로그인</button>
    </div>
    <div id="signup-form" style="display:none">
      <div class="field"><label>닉네임</label><input type="text" id="signup-name" placeholder="내 닉네임"></div>
      <div class="field"><label>아이디 (이메일)</label><input type="email" id="signup-email" placeholder="you@example.com"></div>
      <div class="field"><label>비밀번호</label><input type="password" id="signup-pw" placeholder="6자 이상" onkeydown="if(event.key==='Enter')doSignup()"></div>
      <button class="auth-btn" onclick="doSignup()">가입하기</button>
    </div>
    <div class="auth-err" id="auth-err"></div>
  </div>
</div>

<!-- MAIN SCREEN -->
<div id="main-screen" class="screen">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">Marst<span>Chat</span></div>
      <button class="icon-btn" onclick="openFriendSearch()" title="친구 검색">＋</button>
    </div>
    <div class="sidebar-scroll">
      <div class="section-label">
        채팅방
        <button onclick="openCreateRoom()" title="방 만들기">＋</button>
      </div>
      <div id="rooms-list"></div>
      <div class="sep"></div>
      <div class="section-label">다이렉트 메시지</div>
      <div id="dms-list"></div>
    </div>
    <div class="sidebar-footer">
      <div class="my-avatar" id="my-avatar-text">?</div>
      <div class="my-info">
        <div class="my-name" id="my-name-text">—</div>
        <div class="my-status">● 온라인</div>
      </div>
      <button class="logout-btn" onclick="doLogout()" title="로그아웃">⏻</button>
    </div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area" id="chat-area">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">💬</div>
      <div class="empty-title">대화를 선택하세요</div>
      <div class="empty-sub">왼쪽에서 채팅방이나 친구를 선택하세요</div>
    </div>
    <div id="active-chat" style="display:none; flex-direction:column; flex:1; min-height:0; height:100vh;">
      <div class="chat-header">
        <div class="chat-header-icon" id="chat-hdr-icon">#</div>
        <div>
          <div class="chat-title" id="chat-hdr-title">—</div>
          <div class="chat-subtitle" id="chat-hdr-sub">—</div>
        </div>
        <div class="header-actions">
          <button class="icon-btn" id="invite-btn" onclick="showInviteCode()" title="초대 코드">🔗</button>
        </div>
      </div>
      <div class="messages" id="messages"></div>
      <div class="chat-input-wrap">
        <div class="chat-input-box">
          <textarea id="msg-input" rows="1" placeholder="메시지 입력..." onkeydown="handleMsgKey(event)" oninput="autoResize(this)"></textarea>
        </div>
        <button class="send-btn" onclick="sendMessage()">↑</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: 방 만들기 -->
<div class="modal-overlay" id="modal-create-room">
  <div class="modal">
    <div class="modal-title">채팅방 만들기</div>
    <div class="modal-field"><label>방 이름</label><input type="text" id="new-room-name" placeholder="예: 우리들의 방"></div>
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="closeModal('modal-create-room')">취소</button>
      <button class="modal-btn primary" onclick="createRoom()">만들기</button>
    </div>
    <div class="modal-err" id="create-room-err"></div>
  </div>
</div>

<!-- MODAL: 방 입장 (초대코드) -->
<div class="modal-overlay" id="modal-join-room">
  <div class="modal">
    <div class="modal-title">초대 코드로 입장</div>
    <div class="modal-field"><label>초대 코드</label><input type="text" id="join-code" placeholder="ABC123" style="text-transform:uppercase;letter-spacing:.1em;font-family:'DM Mono',monospace;font-size:18px;text-align:center;"></div>
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="closeModal('modal-join-room')">취소</button>
      <button class="modal-btn primary" onclick="joinRoom()">입장</button>
    </div>
    <div class="modal-err" id="join-room-err"></div>
  </div>
</div>

<!-- MODAL: 초대 코드 보기 -->
<div class="modal-overlay" id="modal-invite">
  <div class="modal">
    <div class="modal-title">초대 코드</div>
    <div class="invite-code-box" id="invite-code-display" onclick="copyInviteCode()">——</div>
    <div class="copy-hint">클릭해서 복사</div>
    <div class="modal-actions" style="margin-top:16px">
      <button class="modal-btn primary" onclick="closeModal('modal-invite')">닫기</button>
    </div>
  </div>
</div>

<!-- MODAL: 친구 검색 -->
<div class="modal-overlay" id="modal-friend-search">
  <div class="modal">
    <div class="modal-title">친구 찾기</div>
    <div class="modal-field">
      <label>방 초대코드 입장 또는 닉네임 검색</label>
      <input type="text" id="friend-search-input" placeholder="닉네임 입력..." oninput="searchUsers()">
    </div>
    <div id="search-results" style="margin-top:8px; display:flex; flex-direction:column; gap:6px;"></div>
    <div class="sep" style="margin:14px 0 10px;"></div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;font-weight:600;">초대 코드로 방 입장</div>
    <div style="display:flex;gap:8px;">
      <input type="text" id="quick-join-code" placeholder="초대 코드" style="flex:1;padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:15px;letter-spacing:.08em;outline:none;">
      <button class="modal-btn primary" style="flex:none;width:auto;padding:9px 16px;" onclick="quickJoin()">입장</button>
    </div>
    <div class="modal-err" id="friend-search-err"></div>
    <div class="modal-actions" style="margin-top:14px">
      <button class="modal-btn secondary" onclick="closeModal('modal-friend-search')">닫기</button>
    </div>
  </div>
</div>

<!-- MODAL: 유저 프로필 -->
<div class="modal-overlay" id="modal-profile">
  <div class="modal">
    <div class="profile-header">
      <div class="profile-avatar-big" id="profile-avatar-big">?</div>
      <div class="chat-title" id="profile-name-big">—</div>
      <div class="profile-uid" id="profile-uid-big">—</div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="closeModal('modal-profile')">닫기</button>
      <button class="modal-btn primary" id="profile-dm-btn" onclick="startDMFromProfile()">DM 보내기</button>
    </div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc, query, where, orderBy, onSnapshot, updateDoc, arrayUnion, serverTimestamp, limit } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyC5jpvaInlf-kRipUcAmHV46bb3Fv4erkM",
  authDomain: "marst-chat.firebaseapp.com",
  projectId: "marst-chat",
  storageBucket: "marst-chat.firebasestorage.app",
  messagingSenderId: "1012629471564",
  appId: "1:1012629471564:web:a892b5f729ef0ac3a28fe9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let currentUserData = null;
let currentChatId = null;
let currentChatType = null; // 'room' | 'dm'
let msgUnsub = null;
let roomsUnsub = null;
let dmsUnsub = null;
let profileTarget = null;

// ── UTILS ──
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
function initials(name) { return (name || '?').slice(0,2).toUpperCase(); }
function fmtTime(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});
}
function genCode() {
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:6}, () => c[Math.floor(Math.random()*c.length)]).join('');
}

window.switchTab = function(tab) {
  document.getElementById('login-form').style.display = tab==='login' ? '' : 'none';
  document.getElementById('signup-form').style.display = tab==='signup' ? '' : 'none';
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='signup')));
  document.getElementById('auth-err').textContent = '';
};

// ── AUTH ──
window.doSignup = async function() {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const pw = document.getElementById('signup-pw').value;
  const err = document.getElementById('auth-err');
  if (!name) { err.textContent = '닉네임을 입력하세요'; return; }
  if (!email) { err.textContent = '이메일을 입력하세요'; return; }
  if (pw.length < 6) { err.textContent = '비밀번호는 6자 이상'; return; }
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pw);
    await updateProfile(cred.user, { displayName: name });
    await setDoc(doc(db, 'users', cred.user.uid), { uid: cred.user.uid, name, email, createdAt: serverTimestamp() });
    err.textContent = '';
  } catch(e) {
    err.textContent = e.code === 'auth/email-already-in-use' ? '이미 사용 중인 이메일' : e.message;
  }
};

window.doLogin = async function() {
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-pw').value;
  const err = document.getElementById('auth-err');
  try {
    await signInWithEmailAndPassword(auth, email, pw);
    err.textContent = '';
  } catch(e) {
    err.textContent = '이메일 또는 비밀번호가 틀렸습니다';
  }
};

window.doLogout = async function() {
  if (msgUnsub) msgUnsub();
  if (roomsUnsub) roomsUnsub();
  if (dmsUnsub) dmsUnsub();
  await signOut(auth);
};

onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;
    const snap = await getDoc(doc(db, 'users', user.uid));
    currentUserData = snap.data() || { name: user.displayName || user.email, uid: user.uid };
    document.getElementById('my-name-text').textContent = currentUserData.name;
    document.getElementById('my-avatar-text').textContent = initials(currentUserData.name);
    showScreen('main-screen');
    loadRooms();
    loadDMs();
  } else {
    currentUser = null; currentUserData = null;
    currentChatId = null; currentChatType = null;
    document.getElementById('rooms-list').innerHTML = '';
    document.getElementById('dms-list').innerHTML = '';
    showScreen('auth-screen');
  }
});

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── ROOMS ──
function loadRooms() {
  const q = query(collection(db, 'rooms'), where('members', 'array-contains', currentUser.uid));
  roomsUnsub = onSnapshot(q, snap => {
    const list = document.getElementById('rooms-list');
    list.innerHTML = '';
    snap.forEach(d => {
      const r = d.data();
      const el = document.createElement('div');
      el.className = 'room-item' + (currentChatId === d.id ? ' active' : '');
      el.onclick = () => openChat(d.id, 'room', r.name, r.inviteCode);
      el.innerHTML = `
        <div class="room-icon">#</div>
        <div class="room-info">
          <div class="room-name">${r.name}</div>
          <div class="room-last">${r.lastMsg || '메시지 없음'}</div>
        </div>`;
      list.appendChild(el);
    });
  });
}

window.openCreateRoom = function() {
  document.getElementById('new-room-name').value = '';
  document.getElementById('create-room-err').textContent = '';
  openModal('modal-create-room');
};

window.createRoom = async function() {
  const name = document.getElementById('new-room-name').value.trim();
  const err = document.getElementById('create-room-err');
  if (!name) { err.textContent = '방 이름을 입력하세요'; return; }
  const code = genCode();
  const ref = await addDoc(collection(db, 'rooms'), {
    name, inviteCode: code,
    members: [currentUser.uid],
    createdBy: currentUser.uid,
    createdAt: serverTimestamp(), lastMsg: ''
  });
  closeModal('modal-create-room');
  toast('방이 생성되었습니다!');
  openChat(ref.id, 'room', name, code);
};

window.joinRoom = async function() {
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  const err = document.getElementById('join-room-err');
  if (!code) { err.textContent = '코드를 입력하세요'; return; }
  await doJoinByCode(code, err);
};

window.quickJoin = async function() {
  const code = document.getElementById('quick-join-code').value.trim().toUpperCase();
  const err = document.getElementById('friend-search-err');
  await doJoinByCode(code, err);
};

async function doJoinByCode(code, errEl) {
  const q = query(collection(db, 'rooms'), where('inviteCode', '==', code));
  const snap = await getDocs(q);
  if (snap.empty) { errEl.textContent = '없는 초대 코드입니다'; return; }
  const d = snap.docs[0];
  await updateDoc(doc(db, 'rooms', d.id), { members: arrayUnion(currentUser.uid) });
  closeModal('modal-join-room');
  closeModal('modal-friend-search');
  toast('방에 입장했습니다!');
  openChat(d.id, 'room', d.data().name, d.data().inviteCode);
}

window.showInviteCode = function() {
  const code = document.getElementById('invite-code-display').textContent;
  openModal('modal-invite');
};

window.copyInviteCode = function() {
  const code = document.getElementById('invite-code-display').textContent;
  navigator.clipboard.writeText(code).then(() => toast('코드 복사됨!'));
};

// ── DMs ──
function loadDMs() {
  const q = query(collection(db, 'dms'), where('members', 'array-contains', currentUser.uid));
  dmsUnsub = onSnapshot(q, async snap => {
    const list = document.getElementById('dms-list');
    list.innerHTML = '';
    for (const d of snap.docs) {
      const dm = d.data();
      const otherId = dm.members.find(m => m !== currentUser.uid);
      const otherSnap = await getDoc(doc(db, 'users', otherId));
      const other = otherSnap.data() || { name: '알 수 없음' };
      const el = document.createElement('div');
      el.className = 'dm-item' + (currentChatId === d.id ? ' active' : '');
      el.onclick = () => openChat(d.id, 'dm', other.name, null, otherId);
      el.innerHTML = `
        <div class="dm-avatar-wrap">
          <div class="avatar">${initials(other.name)}</div>
          <div class="online-dot"></div>
        </div>
        <div class="room-info">
          <div class="room-name">${other.name}</div>
          <div class="room-last">${dm.lastMsg || '메시지 없음'}</div>
        </div>`;
      list.appendChild(el);
    }
  });
}

// ── FRIEND SEARCH ──
window.openFriendSearch = function() {
  document.getElementById('friend-search-input').value = '';
  document.getElementById('search-results').innerHTML = '';
  document.getElementById('friend-search-err').textContent = '';
  document.getElementById('quick-join-code').value = '';
  openModal('modal-friend-search');
};

window.searchUsers = async function() {
  const q = document.getElementById('friend-search-input').value.trim();
  const res = document.getElementById('search-results');
  res.innerHTML = '';
  if (!q) return;
  const snap = await getDocs(collection(db, 'users'));
  snap.forEach(d => {
    const u = d.data();
    if (u.uid === currentUser.uid) return;
    if (!u.name.toLowerCase().includes(q.toLowerCase())) return;
    const el = document.createElement('div');
    el.style.cssText = 'display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;background:var(--bg3);border:1px solid var(--border);';
    el.innerHTML = `<div class="avatar">${initials(u.name)}</div><div style="flex:1"><div style="font-size:13px;font-weight:500;color:var(--text)">${u.name}</div><div style="font-size:11px;color:var(--text3)">${u.email}</div></div><button style="background:var(--accent);border:none;color:#fff;padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;" onclick="startDM('${u.uid}','${u.name}')">DM</button>`;
    el.querySelector('div').onclick = () => showProfile(u);
    res.appendChild(el);
  });
  if (!res.children.length) res.innerHTML = '<div style="font-size:13px;color:var(--text3);text-align:center;padding:10px">검색 결과 없음</div>';
};

window.startDM = async function(uid, name) {
  closeModal('modal-friend-search');
  await openOrCreateDM(uid, name);
};

async function openOrCreateDM(otherId, otherName) {
  const q = query(collection(db, 'dms'), where('members', 'array-contains', currentUser.uid));
  const snap = await getDocs(q);
  let existing = null;
  snap.forEach(d => { if (d.data().members.includes(otherId)) existing = d; });
  if (existing) {
    openChat(existing.id, 'dm', otherName, null, otherId);
  } else {
    const ref = await addDoc(collection(db, 'dms'), {
      members: [currentUser.uid, otherId],
      createdAt: serverTimestamp(), lastMsg: ''
    });
    openChat(ref.id, 'dm', otherName, null, otherId);
  }
}

// ── PROFILE ──
window.showProfile = function(u) {
  profileTarget = u;
  document.getElementById('profile-avatar-big').textContent = initials(u.name);
  document.getElementById('profile-name-big').textContent = u.name;
  document.getElementById('profile-uid-big').textContent = u.email;
  openModal('modal-profile');
};

window.startDMFromProfile = async function() {
  if (!profileTarget) return;
  closeModal('modal-profile');
  closeModal('modal-friend-search');
  await openOrCreateDM(profileTarget.uid, profileTarget.name);
};

// ── CHAT ──
window.openChat = function(id, type, name, inviteCode, otherId) {
  if (msgUnsub) msgUnsub();
  currentChatId = id;
  currentChatType = type;
  document.getElementById('empty-state').style.display = 'none';
  const ac = document.getElementById('active-chat');
  ac.style.display = 'flex';
  document.getElementById('chat-hdr-icon').textContent = type === 'room' ? '#' : initials(name);
  document.getElementById('chat-hdr-title').textContent = name;
  document.getElementById('chat-hdr-sub').textContent = type === 'room' ? `초대 코드: ${inviteCode}` : 'Direct Message';
  document.getElementById('invite-btn').style.display = type === 'room' ? '' : 'none';
  if (inviteCode) document.getElementById('invite-code-display').textContent = inviteCode;
  document.getElementById('messages').innerHTML = '';

  // mark active
  document.querySelectorAll('.room-item,.dm-item').forEach(el => el.classList.remove('active'));

  const col = type === 'room' ? `rooms/${id}/messages` : `dms/${id}/messages`;
  const q = query(collection(db, col), orderBy('createdAt', 'asc'));
  msgUnsub = onSnapshot(q, snap => {
    const container = document.getElementById('messages');
    snap.docChanges().forEach(change => {
      if (change.type === 'added') {
        const m = change.doc.data();
        renderMessage(container, m);
      }
    });
    container.scrollTop = container.scrollHeight;
  });
};

function renderMessage(container, m) {
  const isMe = m.uid === currentUser.uid;
  const div = document.createElement('div');
  div.className = 'msg-group';
  div.innerHTML = `
    <div class="msg-row ${isMe ? 'mine' : ''}">
      ${!isMe ? `<div class="msg-avatar" style="cursor:pointer" onclick='showProfileById("${m.uid}")'>${initials(m.name)}</div>` : ''}
      <div class="msg-content">
        ${!isMe ? `<div class="msg-name">${m.name}</div>` : ''}
        <div class="msg-bubble">${escHtml(m.text)}</div>
        <div class="msg-time">${fmtTime(m.createdAt)}</div>
      </div>
    </div>`;
  container.appendChild(div);
}

window.showProfileById = async function(uid) {
  const snap = await getDoc(doc(db, 'users', uid));
  if (snap.exists()) showProfile(snap.data());
};

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

window.sendMessage = async function() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !currentChatId) return;
  input.value = ''; input.style.height = '';
  const col = currentChatType === 'room' ? `rooms/${currentChatId}/messages` : `dms/${currentChatId}/messages`;
  await addDoc(collection(db, col), {
    text, uid: currentUser.uid, name: currentUserData.name, createdAt: serverTimestamp()
  });
  const lastRef = doc(db, currentChatType === 'room' ? 'rooms' : 'dms', currentChatId);
  await updateDoc(lastRef, { lastMsg: text });
};

window.handleMsgKey = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
};

window.autoResize = function(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
};

// ── MODALS ──
window.openModal = function(id) { document.getElementById(id).classList.add('open'); };
window.closeModal = function(id) { document.getElementById(id).classList.remove('open'); };
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});
</script>
</body>
</html>
